
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent caching of HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>EcobServe — Sustainable Event Planner</title>
    <meta name="description" content="Measure, reduce, and showcase your event's environmental impact. Calculate carbon, water, and waste footprints in real-time with EcobServe." />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />

    <meta property="og:title" content="EcobServe — Plan Events That Leave No Trace" />
    <meta property="og:description" content="Measure, reduce, and showcase your event's environmental impact. Calculate carbon, water, and waste footprints in real-time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EcobServe — Sustainable Event Planner" />
    <meta name="twitter:description" content="Plan events that leave no trace. Real-time carbon, water & waste footprint calculator." />
    <meta name="twitter:image" content="/og.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>

    <!-- Cache busting script - runs before any app code -->
    <script>
      (function() {
        var APP_VERSION = 'BUILD_VERSION_PLACEHOLDER';
        var RELOAD_KEY = 'last_reload_time';
        var MIN_RELOAD_INTERVAL = 5000; // 5 seconds minimum between reloads

        console.log('🔍 Version check: APP_VERSION=' + APP_VERSION);

        // Prevent reload loops
        var lastReload = localStorage.getItem(RELOAD_KEY);
        var now = Date.now();
        if (lastReload && (now - parseInt(lastReload)) < MIN_RELOAD_INTERVAL) {
          console.warn('⚠️ Skipping reload - too soon after last reload');
          localStorage.setItem('app_version', APP_VERSION);
          return;
        }

        // Clear all caches aggressively
        if ('caches' in window) {
          caches.keys().then(function(names) {
            console.log('🗑️ Clearing ' + names.length + ' cache(s)');
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }

        // Unregister service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            console.log('🗑️ Unregistering ' + registrations.length + ' service worker(s)');
            for(var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          });
        }

        // Check version and force reload if changed
        var storedVersion = localStorage.getItem('app_version');
        console.log('📦 Stored version: ' + storedVersion);

        if (storedVersion && storedVersion !== APP_VERSION) {
          console.log('🔄 NEW VERSION DETECTED! Forcing hard reload...');
          console.log('   Old: ' + storedVersion);
          console.log('   New: ' + APP_VERSION);

          // Mark reload time
          localStorage.setItem(RELOAD_KEY, now.toString());

          // Clear storage
          var tempVersion = APP_VERSION;
          var tempReload = now.toString();
          localStorage.clear();
          sessionStorage.clear();

          // Restore version and reload time
          localStorage.setItem('app_version', tempVersion);
          localStorage.setItem(RELOAD_KEY, tempReload);

          // Force hard reload with cache bypass
          window.location.href = window.location.href.split('?')[0] + '?v=' + APP_VERSION + '&t=' + now;
        } else if (!storedVersion) {
          console.log('✅ First visit - storing version');
          localStorage.setItem('app_version', APP_VERSION);
        } else {
          console.log('✅ Version match - no reload needed');
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
